<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijzen | Camperhuren-Twente</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#fffaf2;
      color:#2b2b2b;
    }

    .container{
      width:min(900px, calc(100% - 32px));
      margin:0 auto;
      padding:40px 0;
    }

    .btn{
      display:inline-block;
      padding:12px 18px;
      border-radius:12px;
      background:#f4b860;
      color:#082114;
      text-decoration:none;
      font-weight:700;
      margin-bottom:24px;
    }

    h1{
      margin-bottom:16px;
    }

    p{
      line-height:1.7;
    }

    .price-card{
      background:white;
      border-radius:16px;
      padding:24px;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
      margin-top:20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="btn" href="index.html">← Terug</a>
    <h1>Prijzen</h1>
    <div class="price-card">
      <p><strong>Vanaf €119,- per dag</strong></p>
      <p>Hier kun je later je seizoensprijzen, borg en extra kosten invullen.</p>
    </div>
  </div>
</body>
</html>
